<!DOCTYPE html><html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
<title>Godot Adventure</title><style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	display: none;
}
</style><link rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/><!-- ✅ DESCOMPRESSÃO DO WASM --><script>
async function loadCompressedWasm() {
	const response = await fetch("index.wasm.gz");
	const compressed = await response.arrayBuffer();

	const ds = new DecompressionStream("gzip");
	const decompressedStream =
		new Response(compressed).body.pipeThrough(ds);

	const wasmBuffer =
		await new Response(decompressedStream).arrayBuffer();

	const blob = new Blob([wasmBuffer], { type: "application/wasm" });
	return URL.createObjectURL(blob);
}
</script></head><body><canvas id="canvas">
Your browser does not support the canvas tag.
</canvas><div id="status">
<img id="status-splash" src="index.png" alt="">
<progress id="status-progress"></progress>
<div id="status-notice"></div>
</div><script src="index.js"></script><script>
(async () => {

const wasmURL = await loadCompressedWasm();

const GODOT_CONFIG = {
	args: [],
	canvasResizePolicy: 2,
	emscriptenPoolSize: 8,
	ensureCrossOriginIsolationHeaders: true,
	executable: wasmURL,
	experimentalVK: false,
	fileSizes: {"index.pck":3587096},
	focusCanvas: true,
	gdextensionLibs: [],
	godotPoolSize: 4
};

const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

const statusOverlay = document.getElementById('status');
const statusProgress = document.getElementById('status-progress');

statusOverlay.style.visibility = 'visible';

engine.startGame({
	onProgress: function(current, total) {
		if (current > 0 && total > 0) {
			statusProgress.value = current;
			statusProgress.max = total;
		}
	}
}).then(() => {
	statusOverlay.remove();
}).catch(err => {
	console.error(err);
	alert(err);
});

})();
</script></body>
</html>
